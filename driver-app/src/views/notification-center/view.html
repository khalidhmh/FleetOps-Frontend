<section class="stack notification-view">
    
    <div class="notification-header stack">
        <h1 class="heading-xl">ALERTS</h1>
        <p class="description">Critical operations log and dispatch communications.</p>
    </div>

    <div class="filter-tabs row">
        <button class="button primary chip-filter active">ALL Notifications</button>
    </div>

    <div class="notification-list-container notification-list stack">
        
    </div>
    
    
    <div class="modal-overlay hidden notification-modal">
        <div class="modal-content card">
            <h3 class="heading-md modal-title"></h3>
            <p class="notification-desc modal-body"></p>
            <div class="modal-actions row">
                <button class="button secondary modal-close">Close</button>
            </div>
        </div>
    </div>
</section>
