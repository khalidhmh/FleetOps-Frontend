<section class="login-view stack">

  <!-- LOGIN CONTENT -->
  <div class="login-content">
    <div class="card stack">

      <div class="brand stack">
        <div class="brand-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zm-.5 1.5l1.96 2.5H17V9.5h2.5zM6 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm13.5-1c0 .55-.45 1-1 1s-1-.45-1-1 .45-1 1-1 1 .45 1 1z" />
          </svg>
        </div>
        <div class="brand-text stack">
          <h1 class="heading-lg">FleetOps</h1>
          <div class="brand-line"></div>
        </div>
      </div>

      <form class="login-form stack">
        
        <div class="form-field stack">
          <label class="label">Operator ID / Email</label>
          <div class="input-wrapper">
            <input type="email" class="email-input" name="email" placeholder="name@fleetops.com" required>
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="4" />
                <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94" />
              </svg>
            </span>
          </div>
        </div>

        <div class="form-field stack">
          <div class="field-header">
            <label class="label">Security Token / Password</label>
          </div>
          <div class="input-wrapper">
            <input type="password" class="password-input" name="password" placeholder="••••••••" required>
            <button type="button" class="input-icon toggle-password-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="sign-in-btn">
          Sign In
        </button>
      </form>

    </div>
  </div>

</section>
