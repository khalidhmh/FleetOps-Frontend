<section class="stack profile-view">

    <!-- PROFILE OWNER -->
    <header class="stack card profile-owner">
        <!-- Injected via JS -->
    </header>

    <!-- VEHICLE SECTION -->
    <article class="card profile-card">
        <header class="row section-header">
            <i class="section-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2" />
                    <path d="M15 18H9" />
                    <path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14" />
                    <circle cx="17" cy="18" r="2" />
                    <circle cx="7" cy="18" r="2" />
                </svg>
            </i>
            <h2 class="heading-md">Active Vehicle</h2>
        </header>
        <div class="stack info-group">
            <div class="stack info-item">
                <span class="label">Plate Number</span>
                <span class="info-value vehicle-plate-value"></span>
            </div>
            <div class="stack info-item">
                <span class="label">Model</span>
                <span class="info-value vehicle-model-value"></span>
            </div>
        </div>
    </article>

    <!-- CONTACT MATRIX -->
    <article class="card profile-card">
        <header class="row section-header">
            <i class="section-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 2v2" />
                    <path d="M7 22v-2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2" />
                    <path d="M8 2v2" />
                    <circle cx="12" cy="11" r="3" />
                    <rect x="3" y="4" width="18" height="18" rx="2" />
                </svg>
            </i>
            <h2 class="heading-md">Contact Matrix</h2>
        </header>
        <div class="grid profile-contact-grid">
            <div class="row contact-card">
                <div class="palette-secondary-container contact-icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384" />
                    </svg>
                </div>
                <div class="stack contact-info">
                    <span class="label">Phone</span>
                    <span class="info-value phone-value"></span>
                </div>
            </div>
            <div class="row contact-card">
                <div class="palette-secondary-container contact-icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7" />
                        <rect x="2" y="4" width="20" height="16" rx="2" />
                    </svg>
                </div>
                <div class="stack contact-info">
                    <span class="label">Email</span>
                    <span class="info-value driver-email"></span>
                </div>
            </div>
        </div>
    </article>

    <!-- INTERFACE CONTROLS -->
    <article class="card profile-card">
        <header class="section-header">
            <h2 class="label">Interface Controls</h2>
        </header>
        <div class="stack control-group">
            <!-- Notifications -->
            <div class="row control-row">
                <div class="palette-secondary-container control-icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.268 21a2 2 0 0 0 3.464 0" />
                        <path
                            d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326" />
                    </svg>
                </div>
                <div class="stack control-info">
                    <span class="info-value">Notifications</span>
                    <span class="helper-text">Push alerts for route changes</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked />
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </article>

    <!-- ACTION BUTTONS -->
    <div class="stack profile-actions">
        <button class="button inverted logout-button" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m16 17 5-5-5-5" />
                <path d="M21 12H9" />
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            </svg>
            Logout from Terminal
        </button>
    </div>

    <!-- FOOTER NOTE -->
    <footer class="profile-footer">
        <p class="helper-text">
            FleetOps Mobile v8.4.2 · Commercial<br />
            Fleet Operations Platform
        </p>
    </footer>

</section>
