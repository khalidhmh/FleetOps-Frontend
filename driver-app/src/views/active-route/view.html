<section class="active-route-view stack">

  <!-- ROUTE HEAD -->
  <header class="row justify-between route-head">
    <div class="stack stack-compact route-title">
      <h1 class="heading-xl data-target-route-id">ROUTE ID</h1>
    </div>
    <span class="chip success route-status data-target-status">STATUS</span>
  </header>

  <!--STATS-->
  <div class="grid stats-grid">
    <div class="card stack stack-compact stat-card">
      <span class="label m-0">Vehicle</span>
      <span class="heading-md stat-value data-target-vehicle">vehicle value</span>
    </div>
    <div class="card stack stack-compact stat-card">
      <span class="label m-0">Distance</span>
      <span class="heading-md stat-value data-target-distance">Distance in km</span>
    </div>
    <div class="card stack stack-compact stat-card">
      <span class="label m-0">Progress</span>
      <div class="row items-baseline m-0">
        <span class="heading-md stat-value progress-text data-target-progress">num of stops / total stops</span>
        <span class="helper-text m-0">stops</span>
      </div>
    </div>
  </div>


  <!--PROGRESS BAR-->
  <div class="route-progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
    <div class="route-progress-fill data-target-progress-bar" style="width: 0%"></div>
  </div>


  <!-- STOPS TIMELINE -->
  <div class="stops-timeline">
    <div class="timeline-line"></div>
    <div class="timeline-progress-line"></div>

    <!--ACTIVE STOP-->
    <div class="card active-stop-card">
      <header class="row justify-between stop-card-header">
        <div class="label m-0 active-stop-badge">
          Active Stop · <span class="data-target-completed-stops">num of completed</span> of <span class="data-target-total-stops">total stops</span>
        </div>
        <div class="stack items-end stop-eta">
          <span class="heading-md text-primary eta-time data-target-eta-time">Calculated ETA</span>
          <span class="label m-0 text-primary am-pm data-target-eta-am-pm">AM/PM</span>
          <span class="helper-text m-0">ETA</span>
    </div>
  </header>

      <h2 class="heading-lg stop-name data-target-stop-name">Stop Name</h2>
      <p class="helper-text stop-address data-target-stop-address">Address</p>


      <div class="button-group stop-actions">
        <button class="button outlined navigate-btn" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 11 22 2 13 21 11 13 3 11" />
          </svg>
          Navigate
        </button>
        <button class="button primary route-action-btn" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          Mark Arrived
        </button>
      </div>
    </div>

    <!--PENDING STOP-->
    <div class="card pending-stop-card">
      <h2 class="heading-lg stop-name data-target-pending-name">NAME OF THE STOP</h2>
      <p class="helper-text stop-address data-target-pending-address">Address</p>
    </div>
  </div>
</section>
