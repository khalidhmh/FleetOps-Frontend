<section class="stack delivery-complete-page">

        <!-- SUCCESS HERO -->
        <div class="success-hero">
            <div class="success-banner">
                <div class="success-icon-box primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-circle-check-big-icon lucide-circle-check-big">
                        <path d="M21.801 10A10 10 0 1 1 17 3.335" />
                        <path d="m9 11 3 3L22 4" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- HEADING -->
        <div class="stack">
            <h1 class="heading-lg delivery-title">Delivery Complete!</h1>
            <p class="helper-text">
                Recipient: <strong class="recipient-name data-recipient">John Doe</strong>
            </p>
        </div>

        <!-- PROGRESS CARDS -->
        <div class="grid compact">

            <div class="card stack">
                <div class="row">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-circle-dashed-icon lucide-circle-dashed">
                            <path d="M10.1 2.182a10 10 0 0 1 3.8 0" />
                            <path d="M13.9 21.818a10 10 0 0 1-3.8 0" />
                            <path d="M17.609 3.721a10 10 0 0 1 2.69 2.7" />
                            <path d="M2.182 13.9a10 10 0 0 1 0-3.8" />
                            <path d="M20.279 17.609a10 10 0 0 1-2.7 2.69" />
                            <path d="M21.818 10.1a10 10 0 0 1 0 3.8" />
                            <path d="M3.721 6.391a10 10 0 0 1 2.7-2.69" />
                            <path d="M6.391 20.279a10 10 0 0 1-2.69-2.7" />
                        </svg>
                    </span>
                </div>
                <span class="label">Progress</span>
                <p class="helper-text">
                    <strong class="heading-md stat-number data-current-stop">Stop 4</strong>
                    <span class="data-total-stops"> of 14</span>
                </p>
            </div>

            <div class="card stack">
                <div class="row">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-circle-dashed-icon lucide-circle-dashed">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                            <line x1="16" y1="2" x2="16" y2="6" />
                            <line x1="8" y1="2" x2="8" y2="6" />
                            <line x1="3" y1="10" x2="21" y2="10" />
                        </svg>
                    </span>
                </div>
                <span class="label">Queue</span>
                <p class="helper-text">
                    <strong class="heading-md stat-number data-stops-left">10</strong>
                    <span> Stops Left</span>
                </p>
            </div>

        </div>

        <!-- CASH AMOUNT -->
        <div class="card row cash-card cash-collected-card">
            <div class="stack">
                <span class="label">Cash Collected</span>
                <strong class="heading-md cash-amount data-cash-amount">EGP 450.00</strong>
            </div>
            <button class="icon-button primary cash-receipt-btn" aria-label="View receipt">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <path d="M8 21h8M12 17v4" />
                </svg>
            </button>
        </div>

        <!--BUTTONS -->
        <div class="stack">

            <button class="button primary continue-btn">
                Continue to Next Stop
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-circle-dashed-icon lucide-circle-dashed">
                    <line x1="5" y1="12" x2="19" y2="12" />
                    <polyline points="12 5 19 12 12 19" />
                </svg>
            </button>

            <button class="button secondary view-route-btn">
                View Route
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="3 11 22 2 13 21 11 13 3 11" />
                </svg>
            </button>

        </div>
</section>
