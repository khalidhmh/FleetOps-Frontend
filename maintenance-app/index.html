<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Maintenance App</title>
        <link rel="icon" href="data:," />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
        <link rel="stylesheet" href="./src/styles/main.css" />
    </head>
    <body>
        <div class="dashboard-shell" data-shell>
            <aside class="dashboard-sidebar" aria-label="Sidebar Navigation">
                <div class="sidebar-brand">
                    <div class="sidebar-brand__identity">
                        <div class="sidebar-brand__icon">
                            <i class="fa-solid fa-truck"></i>
                        </div>
                        <div class="sidebar-brand__meta">
                            <strong class="sidebar-brand__title"
                                >FleetOps</strong
                            >
                            <span class="sidebar-brand__subtitle"
                                >Maintenance</span
                            >
                        </div>
                    </div>

                    <button
                        id="sidebar-collapse-btn"
                        class="sidebar-collapse-btn"
                        type="button"
                        aria-controls="app-content"
                        aria-expanded="true">
                        <span aria-hidden="true"
                            ><i class="fa-solid fa-chevron-left"></i
                        ></span>
                        <span class="sidebar-link__label">Collapse</span>
                    </button>
                </div>

                <nav class="sidebar-menu" aria-label="Main Menu">
                    <a
                        class="sidebar-link"
                        href="/"
                        data-link
                        data-route="/"
                        title="My Work Orders">
                        <span class="sidebar-link__icon"
                            ><i class="fa-solid fa-wrench"></i
                        ></span>
                        <span class="sidebar-link__label">My Work Orders</span>
                    </a>
                    <a
                        class="sidebar-link"
                        href="/page-one"
                        data-link
                        data-route="/page-one"
                        title="Spare Parts">
                        <span class="sidebar-link__icon"
                            ><i class="fa-solid fa-cube"></i
                        ></span>
                        <span class="sidebar-link__label">Spare Parts</span>
                    </a>
                    <a
                        class="sidebar-link"
                        href="/preview-page"
                        data-link
                        data-route="/preview-page"
                        title="Notifications">
                        <span class="sidebar-link__icon"
                            ><i class="fa-regular fa-bell"></i
                        ></span>
                        <span class="sidebar-link__label">Notifications</span>
                        <span class="sidebar-link__badge">2</span>
                    </a>
                </nav>

                <div class="sidebar-footer">
                    <div class="sidebar-user">
                        <div class="sidebar-user__avatar">KH</div>
                        <div class="sidebar-user__meta">
                            <strong>Karim Hassan</strong>
                            <span>Mechanic</span>
                        </div>
                    </div>
                    <button class="sidebar-signout" type="button">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span class="sidebar-link__label">Sign Out</span>
                    </button>
                </div>
            </aside>

            <div class="dashboard-main">
                <header class="dashboard-topbar">
                    <div class="dashboard-topbar__left">
                        <button
                            id="sidebar-mobile-btn"
                            class="mobile-menu-btn"
                            type="button"
                            aria-label="Open sidebar">
                            <i class="fa-solid fa-bars"></i>
                        </button>
                        <div class="topbar-title">
                            <h1 id="nav-title">Maintenance</h1>
                            <span class="topbar-live-pill">Live</span>
                        </div>
                    </div>

                    <div class="dashboard-topbar__right">
                        <div class="search-field topbar-search">
                            <span class="search-icon">⌕</span>
                            <input type="text" placeholder="Search..." />
                        </div>
                        <button
                            class="topbar-icon-btn"
                            type="button"
                            aria-label="Notifications">
                            <i class="fa-regular fa-bell"></i>
                        </button>
                        <div class="topbar-user">
                            <div class="topbar-user__avatar">
                                <i class="fa-regular fa-user"></i>
                            </div>
                            <div class="topbar-user__meta">
                                <strong>Ahmed K.</strong>
                                <span>Fleet Manager</span>
                            </div>
                        </div>
                    </div>
                </header>

                <main
                    id="app-content"
                    class="app-content"
                    aria-live="polite"></main>
            </div>
        </div>

        <script type="module" src="./src/main.js"></script>
    </body>
</html>
