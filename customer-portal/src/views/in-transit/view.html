<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<div class="it-view">
    <header class="it-header">
        <div class="it-header-left">
            <i class="bi bi-truck-front-fill it-header-icon"></i>
            <h1 class="it-header-title">Your Delivery</h1>
        </div>
        <div class="it-header-right">
            <span class="it-status-pill">
                <span class="it-pulse-dot"></span> Out for Delivery
            </span>
            <span class="it-order-id">#ORD-88421</span>
        </div>
    </header>

    <!-- Real Leaflet Map -->
    <div class="it-map-wrapper">
        <div id="tracking-map" class="it-leaflet-map"></div>
    </div>

    <div class="it-content-body">
        <div class="it-card it-eta-card">
            <div class="it-eta-info">
                <strong class="it-eta-text">Arriving in ~18 minutes</strong>
                <span class="it-expected">Expected at 10:42 AM</span>
            </div>
            <span class="it-stop-badge">STOP 4 OF 14</span>
        </div>

        <div class="it-card it-driver-card">
            <div class="it-driver-flex">
                <img src="https://i.pravatar.cc/150?u=ahmed" alt="Ahmed" class="it-driver-img">
                <div class="it-driver-meta">
                    <strong class="it-driver-name">Ahmed</strong>
                    <span class="it-driver-desc">Light delivery van</span>
                </div>
            </div>
            <div class="it-driver-actions">
                <button class="it-circle-btn call" id="it-btn-call"><i class="bi bi-telephone-fill"></i></button>
                <button class="it-circle-btn chat" id="it-btn-chat"><i class="bi bi-chat-text-fill"></i></button>
            </div>
        </div>

        <a href="/deliver-preferences" data-link class="it-accordion" style="text-decoration: none; color: inherit; display: block;">
            <div class="it-accordion-header">
                <span><i class="bi bi-gear-fill"></i> Delivery Preferences</span>
                <i class="bi bi-chevron-right"></i>
            </div>
        </a>

        <div class="it-accordion" id="it-summary-accordion">
            <div class="it-accordion-header">
                <span><i class="bi bi-file-earmark-text"></i> Order Summary</span>
                <i class="bi bi-chevron-down it-chevron"></i>
            </div>
            <div class="it-accordion-content">
                <div class="it-sub-info">
                    <span class="it-sub-label">DELIVERY ADDRESS</span>
                    <p>24 El-Tahrir St, Dokki, Giza</p>
                </div>
            </div>
        </div>
    </div>
</div>
