<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FleetOps | Customer Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app-mobile-container" class="app-layout">
    <header class="mobile-header">
      <div class="header-brand">
        <i class="bi bi-truck"></i>
        <span>FleetOps</span>
      </div>
      <div class="header-actions">
        <div class="header-order">#ORD-88421</div>
        <!-- Bell button with unread badge -->
        <button
          id="notif-bell-btn"
          class="notif-bell-btn"
          aria-label="Open notifications"
          aria-haspopup="true"
          aria-controls="notif-sidebar"
        >
          <i class="bi bi-bell"></i>
          <span id="notif-bell-badge" class="notif-bell-badge" hidden>0</span>
        </button>
      </div>
    </header>

    <main id="app-content" class="app-content"></main>

    <nav id="bottom-nav" class="bottom-nav">
      <a href="/order-confirmed" class="nav-item" data-link>
        <i class="bi bi-card-checklist"></i>
        <span>STATUS</span>
      </a>
      <a href="/arriving-alerts" class="nav-item" data-link>
        <i class="bi bi-geo-alt"></i>
        <span>TRACKING</span>
      </a>
      <a href="/delivered" class="nav-item" data-link>
        <i class="bi bi-box-seam"></i>
        <span>DETAILS</span>
      </a>
      <a href="/link-expired" class="nav-item" data-link>
        <i class="bi bi-headset"></i>
        <span>SUPPORT</span>
      </a>
    </nav>
  </div>
  <!-- ── Notification Overlay ─────────────────────────────────── -->
  <div id="notif-overlay" class="notif-overlay" aria-hidden="true"></div>

  <!-- ── Notification Sidebar ──────────────────────────────────── -->
  <aside
    id="notif-sidebar"
    class="notif-sidebar"
    role="dialog"
    aria-modal="true"
    aria-label="Notifications"
  >
    <div class="notif-sidebar__header">
      <div class="notif-sidebar__title-row">
        <h2 class="notif-sidebar__title">
          <i class="bi bi-bell"></i>
          Notifications
        </h2>
        <button id="notif-close-btn" class="notif-sidebar__close" aria-label="Close notifications">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <button id="notif-mark-all-btn" class="notif-sidebar__mark-all">
        Mark all read
      </button>
    </div>
    <div id="notif-list" class="notif-list" role="list"></div>
  </aside>

  <div id="toast-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
